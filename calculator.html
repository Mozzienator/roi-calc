<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket ROI Calculator</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

input{
font-size:18px;
padding:8px;
margin:10px;
width:140px;
}

button{
font-size:18px;
padding:10px 20px;
}

.result{
margin-top:20px;
font-size:22px;
}
</style>

</head>

<body>

<h2>Polymarket → PointsBet ROI</h2>

<p>Polymarket YES price</p>
<input id="poly" type="number" step="0.01">

<p>PointsBet decimal odds</p>
<input id="odds" type="number" step="0.01">

<br>
<button onclick="calc()">Calculate</button>

<div class="result" id="output"></div>

<script>

function calc(){

let poly = parseFloat(document.getElementById("poly").value);
let odds = parseFloat(document.getElementById("odds").value);

let prob = 1 - poly;
let profit = odds - 1;

let EV = prob * profit - (1 - prob);
let ROI = EV * 100;

document.getElementById("output").innerHTML =
"Polymarket implied probability: " + (prob*100).toFixed(1) + "%<br><br>" +
"Expected profit per $1: $" + EV.toFixed(3) + "<br><br>" +
"Projected ROI: " + ROI.toFixed(1) + "%";

}

</script>

</body>
</html>
